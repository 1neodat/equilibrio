<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Equilibrium Pro | Punto de Equilibrio Multiproducto</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-warning: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      --gradient-dark: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      --glass-bg: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(255, 255, 255, 0.2);
      --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius-xl: 1.5rem;
      --radius-lg: 1rem;
      --radius-md: 0.75rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="30" cy="20" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="5" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="70" cy="15" r="1.8" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="25" r="2.2" fill="rgba(255,255,255,0.1)"/></svg>');
      background-repeat: repeat;
      opacity: 0.3;
      pointer-events: none;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header Styles */
    .hero-section {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1rem;
      border-radius: 100px;
      font-size: 0.875rem;
      color: white;
      margin-bottom: 1rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: 1.125rem;
      color: rgba(255, 255, 255, 0.9);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Grid Layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .full-width {
      grid-column: span 2;
    }

    /* Cards */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-xl);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeInUp 0.6s ease-out;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.1);
    }

    .card-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #1e293b;
    }

    .card-header i {
      font-size: 1.75rem;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .stat-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
    }

    /* Input Groups */
    .input-group {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
      background: #f8fafc;
      padding: 1rem;
      border-radius: var(--radius-md);
      transition: all 0.3s ease;
    }

    .input-group:hover {
      background: #ffffff;
      box-shadow: var(--shadow-md);
    }

    .input-group input {
      flex: 1;
      padding: 0.625rem;
      border: 1px solid #e2e8f0;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* Product Cards */
    .products-container {
      display: grid;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .product-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: var(--radius-lg);
      padding: 1rem;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
      position: relative;
    }

    .product-card:hover {
      border-color: #667eea;
      transform: translateX(4px);
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .product-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1e293b;
    }

    .product-badge {
      background: var(--gradient-primary);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .product-fields {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .field label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
    }

    .product-fields input,
    .product-fields select {
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-success {
      background: var(--gradient-success);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #e2e8f0;
      color: #1e293b;
    }

    .btn-outline:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    /* Results Section */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .metric-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      text-align: center;
      border: 1px solid #e2e8f0;
      transition: all 0.3s ease;
    }

    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 800;
      color: #667eea;
      margin-top: 0.5rem;
    }

    /* Chart Container */
    .chart-container {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1rem;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar */
    .products-container::-webkit-scrollbar {
      width: 6px;
    }

    .products-container::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .products-container::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
      .results-grid {
        grid-template-columns: 1fr;
      }
      body {
        padding: 1rem;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Hero Section -->
  <div class="hero-section">
    <div class="hero-badge">
      <i class="fas fa-chart-line"></i> Análisis Financiero Avanzado
    </div>
    <h1>
      <i class="fas fa-balance-scale"></i> Punto de Equilibrio<br>
      Multiproducto
    </h1>
    <p class="hero-subtitle">Calcula el punto de equilibrio para múltiples productos con análisis interactivo y visualizaciones profesionales</p>
  </div>

  <div class="dashboard-grid">
    <!-- Costos Fijos Section -->
    <div class="glass-card">
      <div class="card-header">
        <h2><i class="fas fa-coins"></i> Costos Fijos</h2>
        <button class="btn btn-primary" onclick="agregarRubro()">
          <i class="fas fa-plus"></i> Agregar
        </button>
      </div>
      <div id="rubrosContainer" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

    <!-- Productos Section -->
    <div class="glass-card">
      <div class="card-header">
        <h2><i class="fas fa-boxes"></i> Productos</h2>
        <button class="btn btn-primary" onclick="agregarProducto()">
          <i class="fas fa-plus"></i> Agregar
        </button>
      </div>
      <div id="productosContainer" class="products-container"></div>
      <div style="margin-top: 1rem;">
        <button class="btn btn-success" onclick="calcular()" style="width: 100%;">
          <i class="fas fa-calculator"></i> Calcular Análisis
        </button>
      </div>
    </div>
  </div>

  <!-- Resultados Section -->
  <div class="glass-card full-width" id="resultadosSection" style="display: none;">
    <div class="card-header">
      <h2><i class="fas fa-chart-pie"></i> Dashboard de Resultados</h2>
      <button class="btn btn-outline" onclick="exportarResultados()">
        <i class="fas fa-download"></i> Exportar
      </button>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="results-grid">
      <div>
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-table"></i> Desglose por Producto</h3>
        <div id="desgloseTable" style="overflow-x: auto;"></div>
      </div>
      <div>
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-chart-line"></i> Interpretación</h3>
        <div id="interpretacion" style="background: #f8fafc; padding: 1rem; border-radius: var(--radius-md);"></div>
      </div>
    </div>

    <!-- Gráfica Section -->
    <div style="margin-top: 1.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h3><i class="fas fa-chart-line"></i> Visualización Gráfica</h3>
        <div style="display: flex; gap: 0.5rem;">
          <select id="selectorGrafica" class="btn-outline" style="padding: 0.5rem;" onchange="actualizarGraficaSeleccionada()">
            <option value="total">📊 Vista General</option>
          </select>
          <button class="btn-outline" onclick="alternarPuntoEquilibrio()" style="padding: 0.5rem;">
            <i class="fas fa-chart-simple"></i> Punto EQ
          </button>
          <button class="btn-outline" onclick="descargarGrafica()" style="padding: 0.5rem;">
            <i class="fas fa-camera"></i>
          </button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="graficaEquilibrio"></canvas>
      </div>
    </div>
  </div>

  <div id="error" style="display: none;" class="glass-card" style="background: #fee2e2; color: #991b1b;"></div>
</div>

<script>
  let rubros = [];
  let productos = [];
  let productoCounter = 1;
  let rubroCounter = 1;
  let graficaEquilibrio = null;
  let datosCalculados = null;
  let mostrarPunto = true;

  function agregarRubro() {
    const id = rubroCounter++;
    rubros.push({ id, nombre: `Rubro ${id}`, valor: 0 });
    renderRubros();
  }

  function eliminarRubro(id) {
    rubros = rubros.filter(r => r.id !== id);
    renderRubros();
  }

  function actualizarRubro(id, campo, valor) {
    const rubro = rubros.find(r => r.id === id);
    if (rubro) {
      rubro[campo] = campo === 'valor' ? parseFloat(valor) || 0 : valor;
    }
  }

  function renderRubros() {
    const container = document.getElementById('rubrosContainer');
    if (rubros.length === 0) {
      container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #64748b;"><i class="fas fa-info-circle"></i> No hay rubros agregados</div>';
      return;
    }
    container.innerHTML = rubros.map(rubro => `
      <div class="input-group">
        <input type="text" value="${rubro.nombre}" placeholder="Concepto" onchange="actualizarRubro(${rubro.id}, 'nombre', this.value)" style="flex: 1;">
        <input type="number" value="${rubro.valor}" placeholder="Valor USD" onchange="actualizarRubro(${rubro.id}, 'valor', this.value)" style="flex: 1;">
        <button class="btn" style="background: #fee2e2; color: #dc2626; padding: 0.5rem;" onclick="eliminarRubro(${rubro.id})">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    `).join('');
  }

  function agregarProducto() {
    const id = productoCounter++;
    productos.push({
      id,
      nombre: `Producto ${id}`,
      costoVariable: 0,
      tipoPrecio: 'directo',
      valorPrecio: 0
    });
    renderProductos();
  }

  function eliminarProducto(id) {
    productos = productos.filter(p => p.id !== id);
    renderProductos();
  }

  function actualizarProducto(id, campo, valor) {
    const producto = productos.find(p => p.id === id);
    if (producto) {
      if (campo === 'costoVariable') {
        producto.costoVariable = parseFloat(valor) || 0;
      } else if (campo === 'tipoPrecio') {
        producto.tipoPrecio = valor;
        producto.valorPrecio = 0;
      } else if (campo === 'valorPrecio') {
        producto.valorPrecio = parseFloat(valor) || 0;
      } else if (campo === 'nombre') {
        producto.nombre = valor;
      }
      renderProductos();
    }
  }

  function renderProductos() {
    const container = document.getElementById('productosContainer');
    if (productos.length === 0) {
      container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #64748b;"><i class="fas fa-box-open"></i> No hay productos agregados</div>';
      return;
    }
    container.innerHTML = productos.map(producto => `
      <div class="product-card">
        <div class="product-header">
          <input type="text" value="${producto.nombre}" onchange="actualizarProducto(${producto.id}, 'nombre', this.value)" style="font-weight: 700; font-size: 1rem; border: none; background: transparent; padding: 0;">
          <span class="product-badge">ID: ${producto.id}</span>
        </div>
        <div class="product-fields">
          <div class="field">
            <label><i class="fas fa-chart-line"></i> Costo Variable</label>
            <input type="number" value="${producto.costoVariable}" placeholder="USD" onchange="actualizarProducto(${producto.id}, 'costoVariable', this.value)">
          </div>
          <div class="field">
            <label><i class="fas fa-calculator"></i> Método Precio</label>
            <select onchange="actualizarProducto(${producto.id}, 'tipoPrecio', this.value)">
              <option value="directo" ${producto.tipoPrecio === 'directo' ? 'selected' : ''}>💲 Precio Directo</option>
              <option value="margen" ${producto.tipoPrecio === 'margen' ? 'selected' : ''}>📊 Margen sobre Costo</option>
              <option value="porcentaje" ${producto.tipoPrecio === 'porcentaje' ? 'selected' : ''}>📐 % Utilidad s/Precio</option>
            </select>
          </div>
          <div class="field">
            <label><i class="fas fa-dollar-sign"></i> ${producto.tipoPrecio === 'directo' ? 'Precio' : producto.tipoPrecio === 'margen' ? 'Margen USD' : '% Utilidad'}</label>
            <input type="number" value="${producto.valorPrecio}" placeholder="Valor" onchange="actualizarProducto(${producto.id}, 'valorPrecio', this.value)">
          </div>
        </div>
        <button class="btn" style="background: #fee2e2; color: #dc2626; width: 100%; margin-top: 0.5rem; padding: 0.5rem;" onclick="eliminarProducto(${producto.id})">
          <i class="fas fa-trash"></i> Eliminar Producto
        </button>
      </div>
    `).join('');
  }

  function moneda(valor) {
    return valor.toLocaleString("es-EC", { style: "currency", currency: "USD", minimumFractionDigits: 2 });
  }

  function calcular() {
    if (rubros.length === 0) {
      mostrarError("⚠️ Agregue al menos un rubro de costo fijo");
      return;
    }
    if (productos.length === 0) {
      mostrarError("⚠️ Agregue al menos un producto");
      return;
    }

    let costosFijos = rubros.reduce((sum, r) => sum + r.valor, 0);
    let productosData = [];

    for (const p of productos) {
      let precio = 0;
      if (p.tipoPrecio === 'directo') {
        precio = p.valorPrecio;
      } else if (p.tipoPrecio === 'margen') {
        precio = p.costoVariable + p.valorPrecio;
      } else if (p.tipoPrecio === 'porcentaje') {
        if (p.valorPrecio >= 100) {
          mostrarError(`El porcentaje para ${p.nombre} debe ser menor a 100%`);
          return;
        }
        precio = p.costoVariable / (1 - p.valorPrecio / 100);
      }

      if (precio <= p.costoVariable) {
        mostrarError(`El precio de ${p.nombre} debe ser mayor al costo variable`);
        return;
      }

      productosData.push({
        nombre: p.nombre,
        costoVariable: p.costoVariable,
        precio: precio,
        margenUnitario: precio - p.costoVariable
      });
    }

    const cantidadProductos = productosData.length;
    const costoFijoPorProducto = costosFijos / cantidadProductos;
    
    productosData.forEach(p => {
      p.parteCostoFijo = costoFijoPorProducto;
      p.unidadesExactas = costoFijoPorProducto / p.margenUnitario;
      p.unidades = Math.ceil(p.unidadesExactas);
      p.ventas = p.precio * p.unidades;
      p.costoVariableTotal = p.costoVariable * p.unidades;
      p.margenTotal = p.margenUnitario * p.unidades;
    });

    const ingresosTotales = productosData.reduce((sum, p) => sum + p.ventas, 0);
    const costosVariablesTotales = productosData.reduce((sum, p) => sum + p.costoVariableTotal, 0);
    const costosTotales = costosFijos + costosVariablesTotales;
    const utilidad = ingresosTotales - costosTotales;

    datosCalculados = {
      costosFijos,
      productosData,
      ingresosTotales,
      costosVariablesTotales,
      costosTotales,
      utilidad,
      unidadesTotales: productosData.reduce((sum, p) => sum + p.unidades, 0)
    };

    mostrarResultados();
    cargarSelectorGrafica();
    actualizarGraficaSeleccionada();
    document.getElementById('resultadosSection').style.display = 'block';
    document.getElementById('resultadosSection').scrollIntoView({ behavior: 'smooth' });
  }

  function mostrarResultados() {
    const d = datosCalculados;
    
    // Stats Grid
    const statsHtml = `
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-coins"></i></div>
        <div class="stat-label">Costos Fijos Totales</div>
        <div class="stat-value">${moneda(d.costosFijos)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
        <div class="stat-label">Ingresos Requeridos</div>
        <div class="stat-value">${moneda(d.ingresosTotales)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-boxes"></i></div>
        <div class="stat-label">Unidades Totales</div>
        <div class="stat-value">${d.unidadesTotales}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
        <div class="stat-label">Utilidad Generada</div>
        <div class="stat-value" style="color: ${d.utilidad >= 0 ? '#10b981' : '#ef4444'}">${moneda(d.utilidad)}</div>
      </div>
    `;
    document.getElementById('statsGrid').innerHTML = statsHtml;

    // Desglose Table
    let tableHtml = `<table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="background: #f1f5f9;">
          <th style="padding: 0.75rem; text-align: left;">Producto</th>
          <th style="padding: 0.75rem; text-align: left;">Precio</th>
          <th style="padding: 0.75rem; text-align: left;">Costo Var.</th>
          <th style="padding: 0.75rem; text-align: left;">Margen</th>
          <th style="padding: 0.75rem; text-align: left;">Unidades</th>
          <th style="padding: 0.75rem; text-align: left;">Ventas</th>
        </tr>
      </thead>
      <tbody>`;
    
    d.productosData.forEach(p => {
      tableHtml += `
        <tr style="border-bottom: 1px solid #e2e8f0;">
          <td style="padding: 0.75rem;"><strong>${p.nombre}</strong></td>
          <td style="padding: 0.75rem;">${moneda(p.precio)}</td>
          <td style="padding: 0.75rem;">${moneda(p.costoVariable)}</td>
          <td style="padding: 0.75rem;">${moneda(p.margenUnitario)}</td>
          <td style="padding: 0.75rem;"><strong>${p.unidades}</strong> (${p.unidadesExactas.toFixed(2)})</td>
          <td style="padding: 0.75rem;">${moneda(p.ventas)}</td>
        </tr>
      `;
    });
    
    tableHtml += `</tbody></table>`;
    document.getElementById('desgloseTable').innerHTML = tableHtml;

    // Interpretación
    const interpretacionHtml = `
      <p><strong><i class="fas fa-chart-line"></i> Análisis del Punto de Equilibrio</strong></p>
      <p style="margin-top: 0.5rem;">Para alcanzar el punto de equilibrio, se requieren:</p>
      <ul style="margin-top: 0.5rem; margin-left: 1.5rem;">
        ${d.productosData.map(p => `<li><strong>${p.nombre}:</strong> ${p.unidades} unidades (${moneda(p.ventas)} en ventas)</li>`).join('')}
      </ul>
      <p style="margin-top: 1rem;"><strong><i class="fas fa-chart-simple"></i> Estado:</strong> ${d.utilidad >= 0 ? '✅ Beneficio generado' : '⚠️ Pérdida proyectada'}</p>
      <p style="margin-top: 0.5rem;"><strong><i class="fas fa-check-circle"></i> Verificación:</strong> Ingresos ${moneda(d.ingresosTotales)} - Costos ${moneda(d.costosTotales)} = ${moneda(d.utilidad)}</p>
    `;
    document.getElementById('interpretacion').innerHTML = interpretacionHtml;
  }

  function cargarSelectorGrafica() {
    const selector = document.getElementById("selectorGrafica");
    selector.innerHTML = `<option value="total">📊 Vista General Multiproducto</option>`;
    datosCalculados.productosData.forEach((p, i) => {
      selector.innerHTML += `<option value="${i}">📦 ${p.nombre}</option>`;
    });
  }

  function actualizarGraficaSeleccionada() {
    if (!datosCalculados) return;
    const valor = document.getElementById("selectorGrafica").value;
    valor === "total" ? dibujarGraficaTotal() : dibujarGraficaProducto(parseInt(valor));
  }

  function dibujarGraficaTotal() {
    const d = datosCalculados;
    const precioProm = d.ingresosTotales / d.unidadesTotales;
    const costoProm = d.costosVariablesTotales / d.unidadesTotales;
    const eqExacto = d.costosFijos / (precioProm - costoProm);
    const maxU = Math.max(d.unidadesTotales + 20, eqExacto + 20);
    const ingresos = [], costos = [], punto = [];
    
    for (let i = 0; i <= maxU; i += Math.ceil(maxU / 100)) {
      ingresos.push({ x: i, y: i * precioProm });
      costos.push({ x: i, y: d.costosFijos + i * costoProm });
    }
    if (mostrarPunto) punto.push({ x: eqExacto, y: eqExacto * precioProm });
    
    renderizarGrafica({
      titulo: "Punto de Equilibrio - Vista General",
      ejeX: "Unidades Totales",
      ingresos, costos, punto
    });
  }

  function dibujarGraficaProducto(index) {
    const p = datosCalculados.productosData[index];
    const eqExacto = p.parteCostoFijo / p.margenUnitario;
    const maxU = Math.max(p.unidades + 20, eqExacto + 20);
    const ingresos = [], costos = [], punto = [];
    
    for (let i = 0; i <= maxU; i += Math.ceil(maxU / 100)) {
      ingresos.push({ x: i, y: i * p.precio });
      costos.push({ x: i, y: p.parteCostoFijo + i * p.costoVariable });
    }
    if (mostrarPunto) punto.push({ x: eqExacto, y: eqExacto * p.precio });
    
    renderizarGrafica({
      titulo: `Punto de Equilibrio - ${p.nombre}`,
      ejeX: `Unidades de ${p.nombre}`,
      ingresos, costos, punto
    });
  }

  function renderizarGrafica(config) {
    const ctx = document.getElementById("graficaEquilibrio").getContext("2d");
    if (graficaEquilibrio) graficaEquilibrio.destroy();
    
    graficaEquilibrio = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: "Ingresos",
            data: config.ingresos,
            borderColor: "#10b981",
            backgroundColor: "rgba(16, 185, 129, 0.1)",
            borderWidth: 3,
            pointRadius: 0,
            tension: 0.4,
            fill: true
          },
          {
            label: "Costos",
            data: config.costos,
            borderColor: "#ef4444",
            backgroundColor: "rgba(239, 68, 68, 0.1)",
            borderWidth: 3,
            pointRadius: 0,
            tension: 0.4,
            fill: true
          },
          {
            label: "Punto de Equilibrio",
            data: config.punto,
            borderColor: "#f59e0b",
            backgroundColor: "#f59e0b",
            pointRadius: 8,
            pointHoverRadius: 12,
            showLine: false,
            type: 'scatter'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          tooltip: {
            callbacks: {
              label: (context) => `${context.dataset.label}: ${moneda(context.raw.y)}`,
              title: (context) => `Unidades: ${context[0].raw.x.toFixed(0)}`
            }
          },
          legend: {
            position: 'top',
            labels: { font: { size: 12, weight: 'bold' } }
          }
        },
        scales: {
          x: {
            title: { display: true, text: config.ejeX, font: { weight: 'bold' } },
            grid: { color: "#e2e8f0" }
          },
          y: {
            title: { display: true, text: "Valor (USD)", font: { weight: 'bold' } },
            ticks: { callback: (v) => moneda(v) },
            grid: { color: "#e2e8f0" }
          }
        }
      }
    });
  }

  function alternarPuntoEquilibrio() {
    mostrarPunto = !mostrarPunto;
    actualizarGraficaSeleccionada();
  }

  function descargarGrafica() {
    const canvas = document.getElementById("graficaEquilibrio");
    const link = document.createElement('a');
    link.download = 'analisis-equilibrio.png';
    link.href = canvas.toDataURL();
    link.click();
  }

  function exportarResultados() {
    if (!datosCalculados) return;
    let csv = "Producto,Precio,Costo Variable,Margen Unitario,Unidades Exactas,Unidades a Vender,Ventas\n";
    datosCalculados.productosData.forEach(p => {
      csv += `"${p.nombre}",${p.precio},${p.costoVariable},${p.margenUnitario},${p.unidadesExactas.toFixed(2)},${p.unidades},${p.ventas}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'analisis-punto-equilibrio.csv';
    link.click();
    URL.revokeObjectURL(link.href);
  }

  function mostrarError(mensaje) {
    const errorDiv = document.getElementById('error');
    errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${mensaje}`;
    errorDiv.style.display = 'block';
    errorDiv.style.background = '#fee2e2';
    errorDiv.style.color = '#991b1b';
    errorDiv.style.padding = '1rem';
    errorDiv.style.borderRadius = 'var(--radius-md)';
    setTimeout(() => {
      errorDiv.style.display = 'none';
    }, 5000);
  }

  // Inicializar con datos de ejemplo
  agregarRubro();
  agregarRubro();
  agregarProducto();
  agregarProducto();
  
  // Set example values
  setTimeout(() => {
    if (rubros[0]) {
      rubros[0].nombre = "Alquiler";
      rubros[0].valor = 2000;
      rubros[1].nombre = "Salarios";
      rubros[1].valor = 3000;
      renderRubros();
    }
    if (productos[0]) {
      productos[0].nombre = "Producto A";
      productos[0].costoVariable = 50;
      productos[0].tipoPrecio = "directo";
      productos[0].valorPrecio = 100;
      productos[1].nombre = "Producto B";
      productos[1].costoVariable = 30;
      productos[1].tipoPrecio = "directo";
      productos[1].valorPrecio = 80;
      renderProductos();
    }
  }, 100);
</script>
