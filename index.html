<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punto de Equilibrio Multiproducto</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #0f172a;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f8fafc;
    }

    .resultado {
      background: #eef6ff;
      border-left: 5px solid #2563eb;
      padding: 18px;
      border-radius: 10px;
      line-height: 1.6;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-top: 10px;
    }

    .interpretacion {
      background: #f8fafc;
      padding: 18px;
      border-radius: 10px;
      line-height: 1.7;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Calculadora de Punto de Equilibrio Multiproducto</h1>

    <div class="card">
      <label for="costosFijos">Costos fijos totales</label>
      <input type="number" id="costosFijos" placeholder="Ejemplo: 1000" min="0" step="0.01">

      <button onclick="agregarProducto()">Agregar producto</button>
      <button onclick="calcular()">Calcular</button>

      <div id="error" class="error"></div>

      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio de venta</th>
            <th>Costo variable</th>
            <th>Unidades propuestas</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody id="productos"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Resultados</h2>
      <div id="resultado" class="resultado">
        Ingrese los datos y presione calcular.
      </div>
    </div>

    <div class="card">
      <h2>Gráfica</h2>
      <canvas id="grafica"></canvas>
    </div>

    <div class="card">
      <h2>Interpretación y prueba lógica</h2>
      <div id="interpretacion" class="interpretacion">
        La interpretación aparecerá después del cálculo.
      </div>
    </div>
  </div>

  <script>
    let contador = 0;
    let grafica = null;

    function agregarProducto() {
      contador++;

      const tbody = document.getElementById("productos");

      const fila = document.createElement("tr");
      fila.innerHTML = `
        <td><input type="text" value="Producto ${contador}" class="nombre"></td>
        <td><input type="number" min="0" step="0.01" class="precio" placeholder="Ej: 10"></td>
        <td><input type="number" min="0" step="0.01" class="costo" placeholder="Ej: 6"></td>
        <td><input type="number" min="0" step="1" class="unidades" placeholder="Ej: 50"></td>
        <td><button onclick="this.closest('tr').remove()">X</button></td>
      `;

      tbody.appendChild(fila);
    }

    function calcular() {
      const error = document.getElementById("error");
      const resultado = document.getElementById("resultado");
      const interpretacion = document.getElementById("interpretacion");

      error.textContent = "";

      const costosFijos = parseFloat(document.getElementById("costosFijos").value);

      if (isNaN(costosFijos) || costosFijos <= 0) {
        error.textContent = "Ingrese costos fijos válidos.";
        return;
      }

      const filas = document.querySelectorAll("#productos tr");

      if (filas.length === 0) {
        error.textContent = "Agregue al menos un producto.";
        return;
      }

      let productos = [];
      let margenTotal = 0;
      let ingresosTotales = 0;
      let costosVariablesTotales = 0;
      let unidadesTotales = 0;

      for (const fila of filas) {
        const nombre = fila.querySelector(".nombre").value;
        const precio = parseFloat(fila.querySelector(".precio").value);
        const costo = parseFloat(fila.querySelector(".costo").value);
        const unidades = parseFloat(fila.querySelector(".unidades").value);

        if (!nombre || isNaN(precio) || isNaN(costo) || isNaN(unidades)) {
          error.textContent = "Complete todos los datos de cada producto.";
          return;
        }

        if (precio <= costo) {
          error.textContent = "El precio de venta debe ser mayor que el costo variable en todos los productos.";
          return;
        }

        const margenUnitario = precio - costo;
        const margenProducto = margenUnitario * unidades;
        const ingresoProducto = precio * unidades;
        const costoVariableProducto = costo * unidades;

        productos.push({
          nombre,
          precio,
          costo,
          unidades,
          margenUnitario,
          margenProducto,
          ingresoProducto,
          costoVariableProducto
        });

        margenTotal += margenProducto;
        ingresosTotales += ingresoProducto;
        costosVariablesTotales += costoVariableProducto;
        unidadesTotales += unidades;
      }

      const utilidad = margenTotal - costosFijos;
      const estado = utilidad < 0 ? "PÉRDIDA" : utilidad === 0 ? "EQUILIBRIO EXACTO" : "GANANCIA";

      resultado.innerHTML = `
        <strong>Ingresos totales:</strong> ${moneda(ingresosTotales)}<br>
        <strong>Costos variables totales:</strong> ${moneda(costosVariablesTotales)}<br>
        <strong>Costos fijos:</strong> ${moneda(costosFijos)}<br>
        <strong>Margen total generado:</strong> ${moneda(margenTotal)}<br>
        <strong>Utilidad / pérdida:</strong> ${moneda(utilidad)}<br>
        <strong>Estado:</strong> ${estado}
      `;

      let prueba = `
        <p><strong>Regla lógica:</strong></p>
        <p>El equilibrio se alcanza cuando la suma de los márgenes de contribución cubre exactamente los costos fijos.</p>
        <p><strong>Fórmula:</strong></p>
        <p>
          Margen total = 
          ${productos.map(p => `(${moneda(p.margenUnitario)} × ${p.unidades} unidades de ${p.nombre})`).join(" + ")}
        </p>
        <p><strong>Cálculo:</strong></p>
        <p>
          Margen total = ${moneda(margenTotal)}<br>
          Costos fijos = ${moneda(costosFijos)}<br>
          Resultado = ${moneda(margenTotal)} - ${moneda(costosFijos)} = <strong>${moneda(utilidad)}</strong>
        </p>
      `;

      if (utilidad < 0) {
        prueba += `
          <p><strong>Interpretación:</strong> la combinación ingresada no alcanza el punto de equilibrio. 
          Falta cubrir ${moneda(Math.abs(utilidad))}. La empresa todavía estaría en pérdida.</p>
        `;
      } else if (utilidad === 0) {
        prueba += `
          <p><strong>Interpretación:</strong> la combinación ingresada cubre exactamente todos los costos. 
          No hay pérdida ni ganancia.</p>
        `;
      } else {
        prueba += `
          <p><strong>Interpretación:</strong> la combinación ingresada supera el punto de equilibrio. 
          Después de cubrir los costos fijos, queda una ganancia de ${moneda(utilidad)}.</p>
        `;
      }

      interpretacion.innerHTML = prueba;

      dibujarGrafica(costosFijos, productos);
    }

    function dibujarGrafica(costosFijos, productos) {
      const ctx = document.getElementById("grafica").getContext("2d");

      const maxUnidades = Math.max(...productos.map(p => p.unidades), 10);
      const etiquetas = [];

      for (let i = 0; i <= maxUnidades; i++) {
        etiquetas.push(i);
      }

      const datasets = productos.map(producto => {
        return {
          label: producto.nombre,
          data: etiquetas.map(u => producto.margenUnitario * u),
          borderWidth: 2,
          fill: false
        };
      });

      datasets.push({
        label: "Costos fijos",
        data: etiquetas.map(() => costosFijos),
        borderWidth: 3,
        borderDash: [8, 6],
        fill: false
      });

      if (grafica) {
        grafica.destroy();
      }

      grafica = new Chart(ctx, {
        type: "line",
        data: {
          labels: etiquetas,
          datasets: datasets
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: "Margen generado por producto frente a costos fijos"
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: "Unidades vendidas"
              }
            },
            y: {
              title: {
                display: true,
                text: "Margen acumulado en dinero"
              }
            }
          }
        }
      });
    }

    function moneda(valor) {
      return valor.toLocaleString("es-EC", {
        style: "currency",
        currency: "USD",
        minimumFractionDigits: 2
      });
    }

    agregarProducto();
    agregarProducto();
  </script>
</body>
</html>
